<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steven's Job Autocompleter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { width: 350px; height: auto; }
  </style>
</head>
<body class="bg-gray-50 p-4">
  <div class="flex flex-col gap-4">
    <div class="flex items-center gap-2 border-b pb-2">
      <div class="bg-blue-600 p-2 rounded-lg">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
      <div>
        <h1 class="text-lg font-bold text-gray-800">Job Autocompleter</h1>
        <p class="text-xs text-gray-500">Connected as Steven Ou</p>
      </div>
    </div>

    <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-200">
      <h2 class="text-sm font-semibold text-gray-700 mb-2">Profile Status</h2>
      <div class="space-y-2">
        <div class="flex justify-between text-xs">
          <span class="text-gray-500">School:</span>
          <span class="font-medium text-gray-800">Queens College / CUNY</span>
        </div>
        <div class="flex justify-between text-xs">
          <span class="text-gray-500">Email:</span>
          <span class="font-medium text-gray-800">osteve425@gmail.com</span>
        </div>
        <div class="flex justify-between text-xs">
          <span class="text-gray-500">Graduation:</span>
          <span class="font-medium text-blue-600">May 2027</span>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 gap-2">
      <button id="fillButton" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200 flex items-center justify-center gap-2">
        <span>⚡ Autofill This Page</span>
      </button>
      <button id="optionsButton" class="w-full bg-white hover:bg-gray-100 text-gray-700 font-medium py-2 px-4 rounded-lg border border-gray-300 transition duration-200">
        Edit Profile Data
      </button>
    </div>

    <p class="text-[10px] text-center text-gray-400 mt-2">
      Active on: LinkedIn & Greenhouse
    </p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
