<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; font-family: sans-serif; padding: 15px; background: #f9fafb; }
    .card { background: white; border: 1px solid #ddd; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
    .btn-blue { background: #2563eb; color: white; border: none; width: 100%; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .btn-blue:hover { background: #1d4ed8; }
    .status-item { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; }
  </style>
</head>
<body>
  <h3>Job Autocompleter</h3>
  <div class="card">
    <div class="status-item"><span>School:</span><strong>Queens College</strong></div>
    <div class="status-item"><span>Graduation:</span><strong>May 2027</strong></div>
  </div>
  <div class="grid grid-cols-1 gap-3">
  <button id="fillButton" class="group relative flex w-full items-center justify-center overflow-hidden rounded-xl bg-blue-600 px-6 py-3 font-bold text-white transition-all hover:bg-blue-700 active:scale-95 shadow-md">
    <div class="mr-2 flex h-5 w-5 items-center justify-center rounded-full bg-blue-500 group-hover:bg-blue-400">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-3 h-3">
        <path d="M11.983 1.907a.75.75 0 00-1.292-.657l-8.5 9.5a.75.75 0 00.564 1.25H9.25l-1.233 6.093a.75.75 0 001.292.657l8.5-9.5a.75.75 0 00-.564-1.25H10.75l1.233-6.093z" />
      </svg>
    </div>
    <span class="tracking-wide">Autofill Application</span>
  </button>
  
  <p id="statusMsg" class="text-[10px] text-center text-gray-400 font-medium italic"></p>
</div>
<div class="mt-4 border-t pt-2">
  <p class="text-[10px] text-gray-500 mb-1">Gemini API Configuration</p>
  <input type="password" id="apiKeyInput" placeholder="Paste Gemini Key here" class="w-full text-[10px] p-1 border rounded mb-1">
  <button id="saveKey" class="text-[10px] text-blue-600 underline">Save Key</button>
</div>
  <script src="popup.js"></script>
</body>
</html>
